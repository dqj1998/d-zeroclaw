name: Release on Push

on:
  push:
    branches: [master]

concurrency:
  group: release-on-push
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_CARGO_FEATURES: channel-matrix,channel-lark,memory-postgres

jobs:
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      skip: ${{ steps.ver.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Compute version tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          base_version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -1)
          tag="v${base_version}-build.${GITHUB_RUN_NUMBER}"

          # Skip if this is a docs/chore-only commit
          commit_msg=$(git log -1 --pretty=format:"%s")
          changed_files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if echo "$changed_files" | grep -qvE '^(docs/|\.md$|\.github/workflows/)'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Docs/chore-only change — skipping build"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=${base_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Release: ${tag}"

  web:
    name: Build Web Dashboard
    needs: [version]
    if: needs.version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web dashboard
        run: cd web && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/
          retention-days: 1

  build:
    name: Build ${{ matrix.target }}
    needs: [version, web]
    if: needs.version.outputs.skip != 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: zeroclaw
            ext: tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: zeroclaw
            ext: tar.gz
            cross_compiler: gcc-aarch64-linux-gnu
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            linker: aarch64-linux-gnu-gcc
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: zeroclaw
            ext: tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.os }}-${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist/

      - name: Install cross compiler
        if: matrix.cross_compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.cross_compiler }}

      - name: Build release
        shell: bash
        run: |
          if [ -n "${{ matrix.linker_env || '' }}" ] && [ -n "${{ matrix.linker || '' }}" ]; then
            export "${{ matrix.linker_env }}=${{ matrix.linker }}"
          fi
          cargo build --release --locked --features "${{ env.RELEASE_CARGO_FEATURES }}" --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../zeroclaw-${{ matrix.target }}.${{ matrix.ext }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-${{ matrix.target }}
          path: zeroclaw-${{ matrix.target }}.${{ matrix.ext }}
          retention-days: 14

  publish:
    name: Publish Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: zeroclaw-*
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name '*.tar.gz' -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > SHA256SUMS
          cat SHA256SUMS

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name 'SHA256SUMS' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          # Delete previous build releases to keep things clean (keep last 3)
          gh release list --repo "${{ github.repository }}" --limit 20 \
            | grep -E '\-build\.' \
            | tail -n +4 \
            | awk '{print $1}' \
            | while read -r old_tag; do
                gh release delete "$old_tag" --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
              done

          gh release create "$TAG" release-assets/* \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes "Automated build from \`master\` ($(git log -1 --pretty=format:'%h %s'))" \
            --prerelease
